---
services:
  fake-shelly-3em:
    image: "ghcr.io/malaber/b2500-debug:latest"
    container_name: "fake-shelly-3em"
    restart: unless-stopped
    network_mode: host
    volumes:
      - "./fake-shelly-data:/data"

  b2500-meter:
    image: "ghcr.io/tomquist/astrameter:next"
    container_name: "b2500-meter"
    restart: unless-stopped
    network_mode: host
    user: "25573:25573"
    environment:
      TZ: "Europe/Berlin"
      LOG_LEVEL: "debug"
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - "./config.ini:/app/config.ini:ro"
